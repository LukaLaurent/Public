<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dietagro Infrastructure</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: #e2e8f0;
}

/* HEADER */
header {
    text-align: center;
    padding: 30px 20px;
}

header h1 {
    margin: 0;
    font-size: 32px;
    background: linear-gradient(90deg, #38bdf8, #6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

header p {
    opacity: 0.7;
}

/* SECTION */
section {
    padding: 20px 40px;
}

h2 {
    margin-bottom: 10px;
    font-weight: 500;
    color: #94a3b8;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: rgba(30, 41, 59, 0.6);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    cursor: pointer;
    transition: 0.25s;
    border: 1px solid rgba(255,255,255,0.05);
}

.card:hover {
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 0 20px rgba(56,189,248,0.3);
}

.card b {
    font-size: 16px;
}

.card span {
    font-size: 13px;
    color: #94a3b8;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(5px);
}

.modal-content {
    background: #020617;
    margin: 8% auto;
    padding: 25px;
    width: 400px;
    border-radius: 15px;
    animation: fadeIn 0.3s ease;
    border: 1px solid rgba(255,255,255,0.1);
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

.modal-content h2 {
    margin-top: 0;
}

/* BADGE */
.badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 8px;
    font-size: 12px;
    background: #1e293b;
    margin-top: 5px;
}
</style>
</head>

<body>

<header>
    <h1>Dietagro Infrastructure</h1>
    <p>dietagro.com</p>
    <p>Luka LAURENT • Leopold LECUYER • Nathan MOULIN</p>
</header>

<section>
    <h2>🔥 MAIN</h2>
    <div class="grid" id="main"></div>
</section>

<section>
    <h2>🖥️ VLAN SRV</h2>
    <div class="grid" id="srv"></div>
</section>

<section>
    <h2>🌐 VLAN DMZ</h2>
    <div class="grid" id="dmz"></div>
</section>

<div class="modal" id="modal">
    <div class="modal-content" id="modalContent"></div>
</div>

<script>
const data = {
    main: [
        {name:"FR-DTG-FW01", ip:"192.168.1.2", desc:"Firewall 1"},
        {name:"FR-DTG-FW02", ip:"192.168.1.3", desc:"Firewall 2"}
    ],
    srv: [
        {name:"FR-DTG-AD01", ip:"192.168.2.10", desc:"Microsoft AD 1"},
        {name:"FR-DTG-AD02", ip:"192.168.2.20", desc:"Microsoft AD 2"},
        {name:"FR-DTG-PF01", ip:"192.168.2.30", desc:"PacketFence (NAC & Radius)"},
        {name:"FR-DTG-PF02", ip:"192.168.2.35", desc:"PacketFence (NAC & Radius)"},
        {name:"FR-DTG-ZABBIX01", ip:"192.168.2.40", desc:"Zabbix Monitoring"},
        {name:"FR-DTG-SIEM01", ip:"192.168.2.50", desc:"SIEM (Wazuh & LLaMA)"}
    ],
    dmz: [
        {name:"FR-DTG-WEB01", ip:"192.168.3.10", desc:"Web Server"}
    ]
};

function render(section, elementId) {
    const container = document.getElementById(elementId);

    section.forEach(machine => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <b>${machine.name}</b><br>
            <span>${machine.ip}</span><br>
            <span class="badge">${machine.desc}</span>
        `;

        div.onclick = () => {
            modal.style.display = "block";
            modalContent.innerHTML = `
                <h2>${machine.name}</h2>
                <p><b>IP:</b> ${machine.ip}</p>
                <p><b>Description:</b> ${machine.desc}</p>
            `;
        };

        container.appendChild(div);
    });
}

render(data.main, "main");
render(data.srv, "srv");
render(data.dmz, "dmz");

const modal = document.getElementById("modal");
modal.onclick = () => modal.style.display = "none";
</script>

</body>
</html>
